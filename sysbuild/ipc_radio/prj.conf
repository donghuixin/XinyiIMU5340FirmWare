# Reduced heap and stack for non-audio use (was 8192, causing 99.73% RAM)
CONFIG_HEAP_MEM_POOL_SIZE=4096
CONFIG_MAIN_STACK_SIZE=1024
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024

CONFIG_MBOX=y
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_RPMSG_SHMEM_RESET=y

CONFIG_BT=y
CONFIG_BT_HCI_RAW=y
CONFIG_BT_CTLR_ASSERT_HANDLER=y

# ISO / LE Audio features DISABLED (not needed for simple BLE peripheral)
# CONFIG_BT_ISO_PERIPHERAL=y
# CONFIG_BT_ISO_CENTRAL=y
# CONFIG_BT_ISO_BROADCASTER=y
# CONFIG_BT_ISO_SYNC_RECEIVER=y
CONFIG_BT_EXT_ADV=y
# CONFIG_BT_PER_ADV_SYNC_TRANSFER_RECEIVER=y
# CONFIG_BT_PER_ADV_SYNC_TRANSFER_SENDER=y

# ISO streams DISABLED
# CONFIG_BT_CTLR_CONN_ISO_GROUPS=1
# CONFIG_BT_CTLR_CONN_ISO_STREAMS=2
# CONFIG_BT_CTLR_SYNC_ISO_STREAM_COUNT=2
# CONFIG_BT_CTLR_ADV_ISO_SET=1
# CONFIG_BT_CTLR_ADV_ISO_STREAM_COUNT=2

# One peripheral connection only
CONFIG_BT_MAX_CONN=1
CONFIG_BT_CTLR_SDC_PERIPHERAL_COUNT=1

# Advertising data length
CONFIG_BT_CTLR_ADV_DATA_LEN_MAX=251

# Reduced buffer sizes (was 502, only need 251 for non-audio)
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_BUF_ACL_RX_SIZE=255
CONFIG_BT_BUF_ACL_TX_SIZE=255
CONFIG_BT_L2CAP_TX_MTU=247

CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_CTLR_PHY_CODED=n

CONFIG_BT_CTLR_RX_BUFFERS=4

CONFIG_BT_ATT_PREPARE_COUNT=2
CONFIG_BT_L2CAP_DYNAMIC_CHANNEL=y

CONFIG_IPC_RADIO_BT=y
CONFIG_IPC_RADIO_BT_HCI_IPC=y

# Configure Internal RC Oscillator for LFCLK to bypass missing 32.768kHz crystal issue
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=n
