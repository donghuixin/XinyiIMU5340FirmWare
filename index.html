<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huixin IMU Sync Console - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap');

        body {
            background-color: #000;
            font-family: 'Fira Code', monospace;
            color: #d1d5db;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #000;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 2px;
        }

        .log-line {
            display: block;
            white-space: nowrap;
            font-size: 8.5px;
            line-height: 1.2;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .log-ts {
            color: #eab308;
            margin-top: 5px;
            font-weight: bold;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 2px;
        }

        .log-pkg {
            color: #22d3ee;
            font-style: italic;
        }

        .log-data {
            color: #4ade80;
        }

        /* 修改为自适应网格，方便动态添加 */
        .imu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            grid-auto-rows: minmax(180px, 1fr);
            gap: 0.4rem;
            height: 100%;
            align-content: start;
        }

        .connected-card {
            border-color: #0891b2 !important;
            opacity: 1 !important;
        }

        .charging-indicator {
            animation: pulse 1.5s infinite;
        }

        /* 新增 + 号按钮样式 */
        .add-card-btn {
            border: 1px dashed #333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 180px;
        }

        .add-card-btn:hover {
            border-color: #0891b2;
            color: #0891b2;
            background: rgba(8, 145, 178, 0.1);
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body class="bg-black">
    <header class="flex flex-col gap-2 px-4 py-2 bg-gray-900 border-b border-gray-800 z-10">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-7 h-7 bg-cyan-500 rounded flex items-center justify-center text-black font-black text-base italic">H</div>
                <div>
                    <h1 class="text-xs font-black text-white tracking-widest uppercase leading-none">Huixin IMU Sync</h1>
                    <p class="text-[7px] text-cyan-700 uppercase tracking-widest">6-Axis Precision Sampling Array</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="syncAll('s')" class="bg-green-600 text-black font-bold px-3 py-1 rounded text-[9px] uppercase hover:bg-green-500">同步开启</button>
                <button onclick="syncAll('p')" class="bg-red-700 text-white font-bold px-3 py-1 rounded text-[9px] uppercase hover:bg-red-600">同步停止</button>
                <button onclick="syncAll('BAT')" class="bg-yellow-600 text-black font-bold px-3 py-1 rounded text-[9px] uppercase hover:bg-yellow-500">单次查电</button>
                <button onclick="saveAllLogs()" class="bg-blue-600 text-white font-bold px-3 py-1 rounded text-[9px] uppercase hover:bg-blue-500">保存全部日志</button>
            </div>
        </div>
        <div class="flex justify-between items-center border-t border-gray-800 pt-1 mt-1">
            <span class="text-[9px] text-gray-500">动态连接管理就绪 | 本地数据自动缓存中...</span>
            <div class="flex items-center gap-2 text-[10px]">
                <span class="text-gray-400">自动电量查询:</span>
                <input type="range" id="bat-range" min="1" max="60" value="5" class="w-24 h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer" oninput="document.getElementById('bat-num').value=this.value">
                <input type="number" id="bat-num" min="1" max="60" value="5" class="w-10 bg-black border border-gray-700 text-white px-1 py-0.5 rounded text-center outline-none" oninput="document.getElementById('bat-range').value=this.value">
                <select id="bat-unit" class="bg-black border border-gray-700 text-white px-1 py-0.5 rounded outline-none">
                    <option value="1000">秒</option>
                    <option value="60000" selected>分</option>
                    <option value="3600000">时</option>
                </select>
                <button id="btn-auto-bat" onclick="toggleAutoBat()" class="bg-indigo-600 text-white font-bold px-3 py-1 rounded text-[9px] uppercase hover:bg-indigo-500">开启自动记录</button>
            </div>
        </div>
    </header>

    <main class="flex-1 p-2 overflow-y-auto custom-scrollbar">
        <div id="master-container" class="imu-grid">
            </div>
    </main>

    <footer class="h-24 bg-black border-t border-gray-800 flex flex-col font-mono">
        <div id="global-log" class="flex-1 overflow-y-auto p-2 text-[10px] space-y-0.5 custom-scrollbar text-gray-500">
            <div>系统已就绪。请按 "+" 增加连接位并配对设备。</div>
            <div>支持6轴数据显示：加速度计(ax/ay/az)、陀螺仪(gx/gy/gz)</div>
            <div>电量显示：绿色(正常) | 黄色(低电量) | 红色(极低电量) | ⚡(充电中)</div>
        </div>
    </footer>

    <script>
        /* ================================================================
         * 核心参数与基础状态
         * ================================================================ */
        const SRV_UUID = 'a0e3d901-0c1f-4b5e-8e4a-1a2b3c4d5e6f'; 
        const CMD_UUID = 'a0e3d902-0c1f-4b5e-8e4a-1a2b3c4d5e6f'; 
        const IMU_UUID = 'a0e3d903-0c1f-4b5e-8e4a-1a2b3c4d5e6f'; 
        const BAT_UUID = 'a0e3d904-0c1f-4b5e-8e4a-1a2b3c4d5e6f'; 
        const FULL_PACKET_SIZE = 126;
        const BAT_PACKET_SIZE = 8;

        const imus = {}; // 存放所有动态生成的设备
        let devIdCounter = 0; // 自增ID生成器
        
        // 全局日志缓存池 (供保存功能使用)
        let globalLogArchive = [];

        function recordToArchive(source, msg) {
            const date = new Date();
            const timeStr = `${date.toLocaleString()}.${date.getMilliseconds().toString().padStart(3, '0')}`;
            globalLogArchive.push(`[${timeStr}] [${source}] ${msg}`);
        }

        /* ==============================================================
         * UI 动态初始化及卡片管理
         * ============================================================== */
        function initUI() {
            const container = document.getElementById('master-container');
            container.innerHTML = '';
            
            // 添加 '+' 按钮位
            const addBtn = document.createElement('div');
            addBtn.id = 'add-device-btn';
            addBtn.className = 'add-card-btn rounded bg-gray-950/30';
            addBtn.innerHTML = '+';
            addBtn.onclick = addDeviceCard;
            container.appendChild(addBtn);

            // 初始自带一个连接卡片
            addDeviceCard();
        }

        function addDeviceCard() {
            devIdCounter++;
            const key = `dev-${devIdCounter}`;
            const defaultName = `等待连接...`;
            
            imus[key] = {
                key, name: defaultName, connected: false, cmdChar: null, dataCount: 0, prevCount: 0,
                imuBuffer: new Uint8Array(0), logLines: [], lastBat: { volt: 0, level: 0, charging: false }
            };

            const card = document.createElement('div');
            card.id = `card-${key}`;
            card.className = `border border-gray-900 bg-gray-950/50 rounded flex flex-col overflow-hidden opacity-50 transition-all`;
            card.style.minHeight = '180px';
            card.innerHTML = `
                <div class="flex justify-between items-center px-2 py-1 bg-gray-900/80 border-b border-gray-800">
                    <span id="name-${key}" class="text-[9px] font-bold text-gray-400 truncate max-w-[120px]" title="${defaultName}">${defaultName}</span>
                    <div class="flex items-center gap-2 shrink-0">
                        <span id="bat-${key}" class="text-[8px] text-gray-600 font-mono">--V (--%)</span>
                        <span id="hz-${key}" class="text-[8px] text-cyan-800 font-mono">0Hz</span>
                    </div>
                </div>
                <div class="flex border-b border-gray-900">
                    <button onclick="connectDevice('${key}')" id="btn-conn-${key}" class="flex-1 py-1 text-[8px] bg-blue-900/20 text-blue-400 hover:bg-blue-800/40 border-r border-gray-900">连接</button>
                    <button onclick="disconnectDevice('${key}')" id="btn-disc-${key}" class="hidden flex-1 py-1 text-[8px] bg-red-900/20 text-red-400 hover:bg-red-800/40 border-r border-gray-900">断开</button>
                    <button onclick="removeDeviceCard('${key}')" class="py-1 px-3 text-[9px] bg-gray-900/40 text-gray-500 hover:text-red-500 hover:bg-gray-800" title="移除该槽位">✕</button>
                </div>
                <div id="log-${key}" class="flex-1 overflow-y-auto p-1 bg-black custom-scrollbar leading-none"></div>
            `;
            
            const container = document.getElementById('master-container');
            const addBtn = document.getElementById('add-device-btn');
            container.insertBefore(card, addBtn);
        }

        function removeDeviceCard(key) {
            disconnectDevice(key); 
            delete imus[key];
            const card = document.getElementById(`card-${key}`);
            if(card) card.remove();
        }

        /* ==============================================================
         * 蓝牙连接管理 (带自动名称更新)
         * ============================================================== */
        async function connectDevice(key) {
            const imu = imus[key];
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'Xinyi' }, { namePrefix: 'Meow' }],
                    optionalServices: [SRV_UUID]
                });

                device.addEventListener('gattserverdisconnected', () => {
                    disconnectDevice(key);
                    addLog(`设备已断开连接: ${imu.name}`, 'text-yellow-500');
                });

                const server = await device.gatt.connect();
                
                // 成功连接后提取真实蓝牙名字并更新UI
                imu.name = device.name || `未知设备-${key}`;
                const nameNode = document.getElementById(`name-${key}`);
                nameNode.innerText = imu.name;
                nameNode.title = imu.name;
                nameNode.classList.replace('text-gray-400', 'text-cyan-400');

                const service = await server.getPrimaryService(SRV_UUID);
                imu.cmdChar = await service.getCharacteristic(CMD_UUID);

                const imuChar = await service.getCharacteristic(IMU_UUID);
                await imuChar.startNotifications();
                imuChar.addEventListener('characteristicvaluechanged', (e) => onIMUData(key, e));

                const batChar = await service.getCharacteristic(BAT_UUID);
                await batChar.startNotifications();
                batChar.addEventListener('characteristicvaluechanged', (e) => onBatData(key, e));

                imu.connected = true;
                imu.gattServer = server;
                imu.device = device;

                document.getElementById(`card-${key}`).classList.add('connected-card');
                const btnConn = document.getElementById(`btn-conn-${key}`);
                const btnDisc = document.getElementById(`btn-disc-${key}`);
                btnConn.innerText = '● 已连接';
                btnConn.classList.add('cursor-not-allowed', 'opacity-50');
                btnConn.disabled = true;
                btnDisc.classList.remove('hidden');

                addLog(`已成功连接: ${imu.name} (6轴数据+电量检测)`, 'success');
            } catch (err) {
                addLog(`连接失败: ${err.message}`, 'error');
            }
        }

        function disconnectDevice(key) {
            const imu = imus[key];
            if (!imu) return;

            if (imu.gattServer && imu.gattServer.connected) {
                imu.gattServer.disconnect();
            }

            imu.connected = false;
            imu.gattServer = null;
            imu.device = null;
            imu.cmdChar = null;
            imu.imuBuffer = new Uint8Array(0);
            imu.dataCount = 0;
            imu.prevCount = 0;
            imu.lastBat = { volt: 0, level: 0, charging: false };

            const card = document.getElementById(`card-${key}`);
            if(card) {
                const btnConn = document.getElementById(`btn-conn-${key}`);
                const btnDisc = document.getElementById(`btn-disc-${key}`);
                card.classList.remove('connected-card');
                btnConn.innerText = '连接';
                btnConn.classList.remove('cursor-not-allowed', 'opacity-50');
                btnConn.disabled = false;
                btnDisc.classList.add('hidden');

                // 恢复默认名字状态
                const nameNode = document.getElementById(`name-${key}`);
                imu.name = "等待连接...";
                nameNode.innerText = imu.name;
                nameNode.classList.replace('text-cyan-400', 'text-gray-400');

                document.getElementById(`hz-${key}`).innerText = '0Hz';
                document.getElementById(`bat-${key}`).innerHTML = '--V (--%)';
                document.getElementById(`bat-${key}`).className = 'text-[8px] text-gray-600 font-mono';
            }
            
            addLog(`槽位 [${key}] 已重置`, 'text-gray-500');
        }

        /* ==============================================================
         * IMU 与 电量 数据处理
         * ============================================================== */
        function onIMUData(key, event) {
            const imu = imus[key];
            const raw = new Uint8Array(event.target.value.buffer);

            const combined = new Uint8Array(imu.imuBuffer.length + raw.length);
            combined.set(imu.imuBuffer);
            combined.set(raw, imu.imuBuffer.length);
            imu.imuBuffer = combined;

            while (imu.imuBuffer.length >= FULL_PACKET_SIZE) {
                let startIdx = -1;
                for (let i = 0; i <= imu.imuBuffer.length - FULL_PACKET_SIZE; i++) {
                    if (imu.imuBuffer[i] === 0xAA && imu.imuBuffer[i + 1] === 0x55) {
                        startIdx = i;
                        break;
                    }
                }

                if (startIdx === -1) break;
                if (startIdx > 0) imu.imuBuffer = imu.imuBuffer.slice(startIdx);

                const dv = new DataView(imu.imuBuffer.buffer, imu.imuBuffer.byteOffset, FULL_PACKET_SIZE);
                try {
                    const ts = dv.getUint32(2, true);
                    const now = new Date();
                    const sysTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}.${now.getMilliseconds().toString().padStart(3, '0')}`;

                    const block = [
                        `<span class="log-line log-ts">[${sysTime}]</span>`,
                        `<span class="log-line log-pkg">PKG ts=${ts}</span>`
                    ];

                    for (let i = 0; i < 10; i++) {
                        const offset = 6 + (i * 12);
                        const ax = dv.getInt16(offset, true);
                        const ay = dv.getInt16(offset + 2, true);
                        const az = dv.getInt16(offset + 4, true);
                        const gx = dv.getInt16(offset + 6, true);
                        const gy = dv.getInt16(offset + 8, true);
                        const gz = dv.getInt16(offset + 10, true);

                        const vals = [ax, ay, az, gx, gy, gz].map(v => v.toString().padStart(6));
                        const strData = `A:${vals[0]},${vals[1]},${vals[2]} G:${vals[3]},${vals[4]},${vals[5]}`;
                        block.push(`<span class="log-line log-data">${strData}</span>`);
                        
                        // 录入后台存储，供Save下载
                        recordToArchive(imu.name, `TS:${ts} | ${strData}`);
                    }

                    imu.logLines = [...imu.logLines, ...block].slice(-80);
                    const logDiv = document.getElementById(`log-${key}`);
                    logDiv.innerHTML = imu.logLines.join('');
                    logDiv.scrollTop = logDiv.scrollHeight;

                    imu.dataCount += 10;
                } catch (e) {
                    addLog(`[${imu.name}] IMU解析错误: ${e.message}`, 'error');
                }
                imu.imuBuffer = imu.imuBuffer.slice(FULL_PACKET_SIZE);
            }

            if (imu.imuBuffer.length > 2048) {
                imu.imuBuffer = new Uint8Array(0);
                addLog(`[${imu.name}] IMU缓冲区溢出已清空`, 'text-yellow-500');
            }
        }

        function onBatData(key, event) {
            const imu = imus[key];
            const raw = new Uint8Array(event.target.value.buffer);

            if (raw.length < BAT_PACKET_SIZE) return;
            if (raw[0] !== 0xBB || raw[1] !== 0x66) return;

            try {
                const dv = new DataView(raw.buffer, raw.byteOffset, BAT_PACKET_SIZE);
                const voltNum = parseFloat(dv.getFloat32(2, true).toFixed(2));
                const isCharging = dv.getUint8(6) === 1;
                const levelNum = dv.getUint8(7);

                const batEl = document.getElementById(`bat-${key}`);
                const chargingIcon = isCharging ? '<span class="text-green-500 charging-indicator">⚡</span>' : '';
                batEl.innerHTML = `${voltNum.toFixed(2)}V (${levelNum}%) ${chargingIcon}`;

                let batClass = 'text-green-400';
                if (voltNum < 3.5) batClass = 'text-red-500';
                else if (voltNum < 3.8) batClass = 'text-yellow-500';
                batEl.className = `text-[8px] font-mono ${batClass}`;

                imu.lastBat = { volt: voltNum, level: levelNum, charging: isCharging };

                // 全局日志打印，涵盖了电量数值、状态与名称等，也自动写入了 Archive
                addLog(`设备 [${imu.name}] 电量: ${voltNum.toFixed(2)}V (${levelNum}%) ${isCharging ? '(充电中)' : ''}`, 'success');
            } catch (e) {
                addLog(`[${imu.name}] 电量解析错误: ${e.message}`, 'error');
            }
        }

        /* ==============================================================
         * 指令控制与自动化工具
         * ============================================================== */
        async function sendCmd(key, cmd) {
            const imu = imus[key];
            if (imu.connected && imu.cmdChar) {
                try {
                    const encoder = new TextEncoder();
                    await imu.cmdChar.writeValueWithoutResponse(encoder.encode(cmd));
                    addLog(`发送指令到 ${imu.name}: ${cmd}`, 'text-gray-400');
                } catch (err) {
                    addLog(`指令失败 [${imu.name}]: ${err.message}`, 'error');
                }
            }
        }

        function syncAll(cmd) {
            const cmdStr = cmd === 'BAT' ? 'BAT' : cmd;
            const cmdName = cmd === 's' ? '同步开启采样' : cmd === 'p' ? '同步停止采样' : '批量查询电量';
            Object.keys(imus).forEach(k => sendCmd(k, cmdStr));
            addLog(`执行全局广播: ${cmdName}`, 'text-cyan-400');
        }

        // 定时查询电量相关逻辑
        let autoBatTimer = null;
        function toggleAutoBat() {
            const btn = document.getElementById('btn-auto-bat');
            if (autoBatTimer) {
                clearInterval(autoBatTimer);
                autoBatTimer = null;
                btn.innerText = '开启自动记录';
                btn.classList.replace('bg-indigo-800', 'bg-indigo-600');
                addLog('已停止电量自动查询任务', 'text-yellow-400');
            } else {
                const val = parseInt(document.getElementById('bat-num').value, 10);
                const multiplier = parseInt(document.getElementById('bat-unit').value, 10);
                const ms = val * multiplier;
                
                if (ms < 1000 || isNaN(ms)) {
                    addLog('自动查询间隔时间不能低于1秒', 'error');
                    return;
                }

                // 立即执行一次
                syncAll('BAT');

                autoBatTimer = setInterval(() => {
                    syncAll('BAT');
                }, ms);

                const unitText = document.getElementById('bat-unit').options[document.getElementById('bat-unit').selectedIndex].text;
                btn.innerText = '停止自动记录';
                btn.classList.replace('bg-indigo-600', 'bg-indigo-800');
                addLog(`系统已启动自动电量监测，触发间隔: ${val}${unitText}`, 'text-green-400');
            }
        }

        /* ==============================================================
         * 日志系统
         * ============================================================== */
        function addLog(msg, type) {
            // 清理 HTML 标签存入全局档案
            const pureMsg = msg.replace(/<[^>]*>?/gm, ''); 
            recordToArchive('GLOBAL', pureMsg);

            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-red-500' : type === 'success' ? 'text-cyan-400' : type;
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            const logContainer = document.getElementById('global-log');
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
            while (logContainer.children.length > 50) {
                logContainer.removeChild(logContainer.firstChild);
            }
        }

        // 保存全部日志文件功能
        function saveAllLogs() {
            if (globalLogArchive.length === 0) {
                addLog('当前暂无日志可保存', 'text-yellow-500');
                return;
            }
            const blob = new Blob([globalLogArchive.join('\n')], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `IMU_Full_Record_${new Date().getTime()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            addLog(`日志文件已成功下载！包含 ${globalLogArchive.length} 条记录。`, 'success');
        }

        /* ==============================================================
         * 生命周期管理
         * ============================================================== */
        setInterval(() => {
            Object.keys(imus).forEach(k => {
                const imu = imus[k];
                if (imu.connected) {
                    const hz = imu.dataCount - imu.prevCount;
                    imu.prevCount = imu.dataCount;
                    document.getElementById(`hz-${k}`).innerText = `${hz}Hz`;
                    if (hz < 90 && hz > 0) {
                        addLog(`[${imu.name}] 刷新率偏低: ${hz}Hz`, 'text-yellow-500');
                    }
                }
            });
        }, 1000);

        window.onload = () => {
            initUI();
            addLog('Huixin IMU控制台已初始化。 (动态连接版)', 'text-gray-300');
        };

        window.addEventListener('beforeunload', () => {
            Object.keys(imus).forEach(k => disconnectDevice(k));
        });
    </script>
</body>

</html>
